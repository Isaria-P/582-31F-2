<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Lineup Guide</title>
</head>
<body>
    <main>
        <section>
            <h1>Artist LineUp</h1>
            <p>Click to check artist line up</p>
            <button class="lineup">Load Lineup</button>
            <button class="clear">Clear Lineup</button>
            <p class="status">Click </p>
            <div id="message">Message Area</div>
            <hr>
        </section>
        
        <template id="artist-template">
            <style>
                
                .artist-card{
                    border: 1px solid black;
                    padding: 1rem;
                    border-radius: 4px;
                    margin: 1rem;
                    background-color: slategray;
                    color: black;
                    text-align: center;
                }
                .details{
                    border: 1px solid grey;
                    padding: 1rem;
                    border-radius: 2px;
                    margin: 1rem;
                    background-color: gray;
                    color: black;
                }
                
                .headliner {
                    color: white;
                    border: 4px double hotpink;
                }
                button {
                    margin: 0 45px;
                    line-height: 50px;      
                    text-align: center;     
                    border: 1px dotted slategray;
                    text-decoration: none;
                }
            </style>
                <article class="artist-card">
                    <h3 class="artist-name">Artist Name</h3>
                    <p class="artist-genre">Artist Genre</p>
                    <p class="artist-stage">Artist Stage</p>
                    <p class="artist-time">Artist Time</p>
                    <p class="artist-country">Artist country</p>
                    <p class="artist-headliner">Artist Headliner</p>
                    <button class="detail">View Details</button>
                </article>
        </template>
        <section>
            <hr>
            <div class="lineup-container"></div>
            <p class="details">Details Panel</p>
        </section>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
